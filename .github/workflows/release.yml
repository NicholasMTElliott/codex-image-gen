name: Release

# Triggered by tags of the form `release/v0.0.0`. Runs the full test matrix
# first; only publishes a GitHub Release with the user-facing zip if every
# matrix job passes.
on:
  push:
    tags:
      - 'release/v*'

jobs:
  check:
    name: Check tag matches package.json version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify versions match
        shell: bash
        run: |
          # Tag is 'release/vX.Y.Z'; strip the prefix and the leading 'v'.
          TAG_VERSION="${GITHUB_REF_NAME#release/}"
          DISPLAY_VERSION="${TAG_VERSION#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag (display)   : $DISPLAY_VERSION"
          echo "package.json    : $PKG_VERSION"
          if [ "$DISPLAY_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($DISPLAY_VERSION) does not match package.json version ($PKG_VERSION)."
            echo "::error::Fix: bump package.json to $DISPLAY_VERSION on master, then re-tag the new commit. (Delete the bad tag locally and remotely first: git tag -d release/v$DISPLAY_VERSION && git push origin :refs/tags/release/v$DISPLAY_VERSION)"
            exit 1
          fi
          echo "OK — versions match ($DISPLAY_VERSION)"

  test:
    name: Test ${{ matrix.os }} / Node ${{ matrix.node }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm test

  release:
    name: Build and publish release
    needs: [check, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          # Tag is 'release/vX.Y.Z' (or '...-beta', etc).
          TAG_VERSION="${GITHUB_REF_NAME#release/}"   # vX.Y.Z
          DISPLAY_VERSION="${TAG_VERSION#v}"          # X.Y.Z
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing ${DISPLAY_VERSION} (tag ${GITHUB_REF_NAME})"

      - name: Build release zip
        id: zip
        shell: bash
        run: |
          mkdir -p dist
          ZIP_NAME="codex-image-gen-${{ steps.version.outputs.display_version }}.zip"
          # Only the user-facing files. Tests, CI config, .gitignore, and
          # package.json are intentionally excluded — release-zip users don't
          # need them.
          zip "dist/$ZIP_NAME" \
            codex-image-gen.mjs \
            install.mjs \
            SKILL.md \
            README.md \
            CHANGELOG.md \
            LICENSE
          echo "zip_path=dist/$ZIP_NAME" >> "$GITHUB_OUTPUT"
          unzip -l "dist/$ZIP_NAME"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "codex-image-gen ${{ steps.version.outputs.display_version }}" \
            --generate-notes \
            "${{ steps.zip.outputs.zip_path }}"
