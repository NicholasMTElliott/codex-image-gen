name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # No npm install — the project has zero runtime or test-time deps.
      # The fake-codex shim under tests/fake-codex/ stands in for the real
      # codex CLI, so CI does not need OAuth or a ChatGPT subscription.
      - run: node --version
      - run: npm test
